; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
framework = arduino

lib_deps =
    adafruit/Adafruit PN532 @ ^1.3.4
    adafruit/Adafruit BusIO @ ^1.16.1
    esphome/AsyncTCP-esphome @ ^2.1.4
    mathieucarbou/ESPAsyncWebServer @ 3.3.23

monitor_speed = 115200
upload_speed = 921600

board_build.embed_txtfiles =
    data/index.html
    data/style.css
    data/app.js
    data/setup.html
    data/settings.html

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
platform = espressif32

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
platform = espressif32

; ESP32-C6 (pioarduino) — commented out to prevent cross-contamination
; with stock espressif32 environments. Build separately or in a dedicated branch.
; [env:esp32-c6-devkitm-1]
; board = seeed_xiao_esp32c6
; platform = https://github.com/pioarduino/platform-espressif32.git#develop
; build_flags = -DBOARD_SEEED_XIAO_ESP32C6
; lib_deps =
;     adafruit/Adafruit PN532 @ ^1.3.4
;     adafruit/Adafruit BusIO @ ^1.16.1
;     ESP32Async/AsyncTCP
;     ESP32Async/ESPAsyncWebServer
; monitor_speed = 115200

; [env:ESP32_C6_env]
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
; board = esp32-c6-devkitm-1
; framework = arduino
; upload_port = /dev/ttyACM0
; build_flags =
; 	-D ARDUINO_USB_MODE=1
; 	-D ARDUINO_USB_CDC_ON_BOOT=1
; 	-D ESP32_C6_env

; ESP32-C6 requires the pioarduino platform for Arduino framework support.
; See: https://github.com/pioarduino/platform-espressif32
; [env:seeed_xiao_esp32c6]
