; PlatformIO Project Configuration File
;
; Pure ESP-IDF framework — supports ESP32-S3, ESP32-C3, and ESP32-C6 natively.
; No Arduino dependency. All boards use the official espressif32 platform.

[env]
platform = espressif32
framework = espidf
monitor_speed = 115200
upload_speed = 921600
extra_scripts =
    pre:scripts/gen_web_assets.py
    pre:scripts/fix_flash_size.py
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1

[env:esp32-c6-devkitm-1]
board = esp32-c6-devkitm-1

[env:seeed_xiao_esp32c6]
board = seeed_xiao_esp32c6
build_flags = -DBOARD_SEEED_XIAO_ESP32C6
board_build.partitions = partitions_4mb.csv
board_upload.flash_size = 4MB
